name: Flutter Build (Android + iOS)

# ──────────────────────────────────────────────
# Когда запускается:
#   - при каждом push в ветку main
#   - вручную через GitHub UI (Actions → Run workflow)
# ──────────────────────────────────────────────
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_ios:
        description: 'Build iOS IPA (slower, macOS runner)'
        type: boolean
        default: true
      build_android:
        description: 'Build Android APK + AAB'
        type: boolean
        default: true

# ══════════════════════════════════════════════
# JOB 1 — Android (APK + AAB)
# ══════════════════════════════════════════════
jobs:
  android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    # При ручном запуске — только если выбрано build_android
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.build_android)

    steps:
      # ── 1. Код ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Кеш pub ──────────────────────────────────
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ── 3. Кеш Gradle ───────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Java 21 ──────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── 5. Flutter ──────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 6. Зависимости ──────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 7. Анализ ───────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 8. Сборка APK ───────────────────────────────
      - name: Build APK (release)
        run: flutter build apk --release

      # ── 9. Сборка AAB ───────────────────────────────
      - name: Build AAB (release)
        run: flutter build appbundle --release

      # ── 10. Загрузить APK ───────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 11. Загрузить AAB ───────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30


# ══════════════════════════════════════════════
# JOB 2 — iOS (IPA, unsigned — для тестирования)
#
# ► Что получится:
#   - IPA-файл собранный без подписи (no-codesign)
#   - Можно установить через Xcode Devices или
#     TestFlight/Diawi после ручной подписи
#
# ► Требования:
#   - macOS runner (дороже linux ~10×, но нужен для Xcode)
#   - Для подписанного IPA нужны secrets:
#       IOS_P12_BASE64, IOS_P12_PASSWORD,
#       IOS_PROVISIONING_PROFILE_BASE64, IOS_TEAM_ID
#   - Без secrets — собирается unsigned IPA (для симулятора/
#     установки через AltStore / ADB-like инструменты)
# ══════════════════════════════════════════════
  ios:
    name: Build iOS (IPA)
    runs-on: macos-latest
    # При push — всегда; при ручном запуске — только если выбрано build_ios
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.build_ios)

    steps:
      # ── 1. Код ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Кеш pub ──────────────────────────────────
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ── 3. Кеш CocoaPods ────────────────────────────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # ── 4. Flutter ──────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 5. Зависимости Flutter ──────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 6. Ruby + Bundler (фикс xcodeproj 1.27.0 баг) ──
      # ios/Gemfile пинит xcodeproj = 1.26.0.
      # ruby/setup-ruby автоматически запускает bundle install.
      # После этого используем bundle exec pod install чтобы
      # RubyGems гарантировал нужную версию xcodeproj.
      - name: Setup Ruby with Bundler (pin xcodeproj 1.26.0)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true       # автоматически запускает bundle install
          working-directory: ios    # читает ios/Gemfile

      # ── 7. CocoaPods через Bundler ───────────────────
      - name: Install CocoaPods (bundle exec)
        working-directory: ios
        run: bundle exec pod install --repo-update

      # ── 8. Сборка через xcodebuild (без подписи) ────
      # flutter build ios --no-codesign в новых версиях Flutter
      # всё равно требует Development Team.
      # Используем xcodebuild напрямую с CODE_SIGNING_ALLOWED=NO.
      - name: Build iOS with xcodebuild (no codesign)
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $PWD/build/ios/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates 2>&1 | tail -50
          echo "✅ Archive created"

      # ── 9. Упаковка в IPA ───────────────────────────
      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r "build/ios/Runner.xcarchive/Products/Applications/Runner.app" \
                "build/ios/ipa/Payload/"
          cd build/ios/ipa
          zip -r "../../../build/ios/Runner-unsigned.ipa" Payload
          echo "✅ IPA created at build/ios/Runner-unsigned.ipa"

      # ── 9. Загрузить IPA ────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: build/ios/Runner-unsigned.ipa
          retention-days: 30

      # ── 10. Загрузить .app (для Xcode Simulator) ────
      - name: Upload Runner.app
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-app-${{ github.run_number }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 14
