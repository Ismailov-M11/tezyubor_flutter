name: Flutter Android Build

# ──────────────────────────────────────────────
# Когда запускается:
#   - при каждом push в ветку main
#   - вручную через GitHub UI (Actions → Run workflow)
# ──────────────────────────────────────────────
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest  # Linux быстрее и дешевле для Android

    steps:
      # ── 1. Скачать код репозитория ──────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Кеш pub зависимостей ─────────────────────
      # Ключ основан на pubspec.lock — кеш сбрасывается
      # только при изменении зависимостей
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ── 3. Кеш Gradle ───────────────────────────────
      # Самый долгий шаг Android-сборки — без кеша ~5 мин,
      # с кешем ~30 сек
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Установить Java 21 ───────────────────────
      # Yandex MapKit 4.22.0-full скомпилирован под Java 21.
      # Без этого шага Gradle падает с "class file has wrong version 65.0"
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── 5. Установить Flutter (stable) ──────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true  # кешируется сам Flutter SDK

      # ── 6. Установить зависимости ───────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 7. Анализ кода ──────────────────────────────
      # continue-on-error: true — warnings не ломают билд,
      # но ошибки будут видны в логах
      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      # ── 8. Сборка APK (release) ─────────────────────
      # Результат: build/app/outputs/flutter-apk/app-release.apk
      - name: Build APK
        run: flutter build apk --release

      # ── 9. Сохранить APK как артефакт ───────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30


