workflows:
  ios-unsigned:
    name: iOS Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          bundle install
          bundle exec pod install --repo-update

      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign || true

      - name: Package unsigned IPA
        script: |
          APP="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: Runner.app not found — Xcode build failed"
            find build/ios -name "*.app" 2>/dev/null || true
            exit 1
          fi
          mkdir -p Payload build/ios/ipa
          cp -r "$APP" Payload/
          zip -r build/ios/ipa/Runner.ipa Payload/
          echo "IPA ready: build/ios/ipa/Runner.ipa"

    artifacts:
      - build/ios/ipa/Runner.ipa
